# Bot Detection & Security Maps Configuration

map $http_user_agent $bad_bot {
    default 0;
    ~*(googlebot|bingbot|Slurp|DuckDuckBot) 0;
    ~*(scrap|bot|crawler|spider|collect|scan|harvest|wget|curl|libwww-perl|nikto|sqlmap) 1;
}

map $request_uri $is_malicious {
    default 0;

    # === SQL Injection Patterns ===
    "~* union.{0,5}select" 1;
    "~* insert.{0,5}into" 1;
    "~* delete.{0,5}from" 1;
    "~* drop.{0,5}table" 1;
    "~* exec.{0,5}\(|execute.{0,5}\(" 1;
    "~* sp_|xp_" 1;
    "~* select.{0,5}from|union.{0,5}all" 1;
    "~* ;.{0,5}(drop|delete|insert|update)" 1;
    "~* (union|select|insert|delete|drop|exec|--|;|')" 1;
    "~* (--|#).{0,5}(\\w|$)" 1;
    "~* /\\*.*\\*/|\\*/|/\\*" 1;
    "~* 1.{0,5}or.{0,5}1|or.{0,5}1.{0,5}=.{0,5}1" 1;
    "~* admin.{0,3}--|.{0,3}or.{0,3}sleep" 1;
    "~* (\\x27|\\x22).{0,5}(or|and).{0,5}(\\x27|\\x22)" 1;

    # === XSS Patterns ===
    "~* <script|</script>|<iframe|<embed|<object|<applet" 1;
    "~* javascript:|data:text/html|vbscript:" 1;
    "~* <img.{0,50}src|<img.{0,50}onerror" 1;
    "~* (onerror|onload|onmouseover|onclick|onfocus|onblur|onmouseout).{0,3}=" 1;
    "~* eval\\(|expression\\(|fromCharCode|String\\.fromCharCode" 1;
    "~* document\\.|window\\.|alert\\(|confirm\\(|prompt\\(" 1;
    "~* base64|atob|btoa" 1;

    # === Path Traversal ===
    "~* \.\.|%2e%2e|\.git|\.env" 1;
    "~* %2e%2e%2f" 1;          
    "~* %2e%2e%5c" 1;          
    "~* %252e%252e" 1;          
    "~* \.\.%2f" 1;           
    "~* \.\.%5c" 1;           
    "~* etc%2fpasswd" 1;        
    "~* etc%2fshadow" 1;     
    "~* proc%2fself" 1;         
    
    # Regular path traversal
    "~* \.\./" 1;
    "~* \.\.\\\\" 1;
    "~* (\.\./|\.\.\\\\|%2e%2e%2f|%2e%2e%5c|%252e%252e)" 1;

    # Sensitive files
    "~* etc/passwd|etc/shadow|etc/hosts" 1;
    "~* windows/system|boot\.ini|win\.ini" 1;
    "~* /proc/self|/proc/\\d+" 1;
    "~* /sys/|/dev/" 1;

    # Config files
    "~* \.git/|\.env|\.htaccess|\.htpasswd" 1;
    "~* wp-config|config\.php|database\.yml" 1;

    # === Command Injection ===
    "~* ;.{0,5}(cat|ls|wget|curl|nc|bash|sh)\s" 1;
    "~* (\||&&|`).{0,5}(cat|ls|id|whoami)" 1;
    "~* base64_decode|eval|exec|system|shell_exec|passthru" 1;

    # === File Upload Bypasses ===
    "~* \.php|\.phtml|\.php3|\.php4|\.php5|\.pht" 1;
    "~* \.jsp|\.asp|\.aspx|\.cgi" 1;

    # === Null Byte ===
    "~* %00|\\x00" 1;
}

# Advanced suspicious detection
map $http_user_agent $is_suspicious {
    default 0;
    "" 1;
    "~*(?i)(python|java|ruby|php|perl|scrapy|curl|wget|http-client|httpclient|nessus|masscan|nikto|sqlmap)" 1;
    "~*(?i)(bot|crawler|spider|scrape|harvest|fetch|collector|parser|monitor|checker|reconnaissance)" 1;
    "~*(<|>|'|\"|;|eval|alert|script|union|select|insert|delete|update|drop|--|/\*|\*/|xp_|sp_)" 1;
}

# Browser fingerprinting
map $http_accept $not_browser {
    default 1;
    ~*text/html 0;
}

# JWT Token Validation
map $http_authorization $jwt_status {
    default "invalid";
    ~^Bearer\s+[A-Za-z0-9\-_=]+\.[A-Za-z0-9\-_=]+\.[A-Za-z0-9\-_=]+$ "valid";
}

# Referer requirement for sensitive endpoints
map $request_uri $require_referer {
    default 0;
    ~^/v1/deposit/ 1;
    ~^/v1/withdrawals/ 1;
    ~^/v1/wallet/ 1;
}

# Content-Type validation
map $content_type $invalid_content_type {
    default 1;
    "application/json" 0;
    "application/x-www-form-urlencoded" 0;
    "multipart/form-data" 0;
    "" 0;
}

# API version detection
map $request_uri $api_version {
    ~^/api/v1/ "1.0";
    ~^/api/v2/ "2.0";
    default "2.0";
}

# IP Access Control
geo $admin_access {
    default 0;
    127.0.0.1 1;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
}

# Maintenance mode control
geo $maintenance_mode {
    default 0;
    127.0.0.1 0;
    10.0.0.0/8 0;
}

# Error messages
map $bad_bot $bot_error {
    0 "";
    1 "{\"error\":\"Forbidden - Bot detected\",\"code\":\"BOT_BLOCKED\"}";
}

map $is_suspicious $suspicious_error {
    0 "";
    1 "{\"error\":\"Forbidden - Suspicious activity\",\"code\":\"SUSPICIOUS_UA\"}";
}

map $maintenance_mode $maintenance_error {
    0 "";
    1 "{\"error\":\"Service under maintenance\",\"retry_after\":3600,\"code\":\"MAINTENANCE\"}";
}

map $request_method$http_referer $note_api_check {
    default 0;
    "~^POSThttps?://localhost:8000/v1/notes/" 1;
    "~^POSThttps?://localhost:8292/api/notes/" 1;
}