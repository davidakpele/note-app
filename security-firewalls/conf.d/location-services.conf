# Static Assets
location /assets/ {
    proxy_pass http://frontend/assets/;
    proxy_cache static_cache;
    proxy_cache_valid 200 7d;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Cache-Status $upstream_cache_status;
}

# Frontend with Security Checks
location / {
    if ($maintenance_mode = 1) {
        add_header Content-Type application/json always;
        add_header X-Blocked-Reason "maintenance" always;
        return 503 $maintenance_error;
    }
    
    # Block bad bots 
    if ($bad_bot = 1) {
        add_header Content-Type application/json always;
        add_header X-Blocked-Reason "bot" always;
        return 403 $bot_error;
    }
  
    # Global rate limiting
    limit_req zone=global_limit burst=200 nodelay;
    limit_req_status 429;
    
    # Proxy to frontend
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Critical for SPA applications
    proxy_set_header Connection "";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Accept-Encoding "";
    
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Buffer settings
    proxy_buffering off;
    proxy_request_buffering off;
    
    # Don't buffer responses
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    
    # Disable redirect following for SPA
    proxy_redirect off;
    
    # Error handling
    proxy_intercept_errors on;
    error_page 502 503 504 = @frontend_fallback;
}

location @frontend_fallback {
    internal;
    add_header Retry-After 60 always;
    add_header Content-Type application/json always;
    return 503 '{"error":"Service temporarily unavailable","retry_after":60,"request_id":"$req_id"}';
}


location /api/notes {
    if ($is_malicious) {
        access_log /var/log/nginx/security_blocked.log security_log;
        add_header Content-Type application/json always;
        return 403 '{"error":"Attack pattern detected","code":"ATTACK_BLOCKED"}';
    }

    set $block_traversal 0;

    # Common traversal patterns
    if ($request_uri ~* "(\.\./|%2e%2e%2f|%2e%2e%5c)") {
        set $block_traversal 1;
    }

    # Attempts to access system files
    if ($request_uri ~* "(etc/passwd|windows/system.ini|/proc/self/environ)") {
        set $block_traversal 1;
    }

    # Attempts to read project secrets
    if ($request_uri ~* "(\.env|\.git/config)") {
        set $block_traversal 1;
    }

    # Obfuscated traversal (multiple dots, slashes)
    if ($request_uri ~* "(\.\.\.\.|\/\/)") {
        set $block_traversal 1;
    }

     # If flagged → block immediately
    if ($block_traversal = 1) {
        return 403;
    }

    if ($request_uri ~ "\x00") {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Null byte detected","code":"NULL_BYTE_INJECTION"}';
    }

    # Block URL-encoded traversal: %2e%2e (URL-encoded ../)
    if ($request_uri ~* "(%2e%2e|%252e%252e|%3a%2f|%3a%5c|%252f|%255c)") {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Encoded path traversal detected","code":"ENCODED_TRAVERSAL"}';
    }

    # Block standard path traversal: ../ and ..\
    if ($request_uri ~ "(\.\./|\.\.[\\\\])") {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Path traversal detected","code":"PATH_TRAVERSAL"}';
    }

        # Block obfuscated traversal: ....// and ....\\
    if ($request_uri ~* "(\.{4}/|\.{4}[\\\\])" ) {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Obfuscated path traversal detected","code":"OBFUSCATED_TRAVERSAL"}';
    }

    # Block access to sensitive files via path
    if ($request_uri ~* "(passwd|shadow|system\.ini|config\.php|wp-config|\.env|\.git|\.svn|\.aws|proc/self|environ)" ) {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Sensitive file access blocked","code":"SENSITIVE_FILE_ACCESS"}';
    }

    # Block Windows-style traversal with escaped backslashes
    if ($request_uri ~ "[\\\\][\\\\]") {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Windows path traversal detected","code":"WINDOWS_TRAVERSAL"}';
    }

    # Block double URL encoding variations
    if ($request_uri ~* "(%25|%3d).*(\.\.)") {
        access_log /var/log/nginx/attacks.log security_log;
        return 403 '{"error":"Forbidden - Double encoded traversal detected","code":"DOUBLE_ENCODED_TRAVERSAL"}';
    }

    # Block malicious patterns
    if ($is_malicious) {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"Forbidden - Attack pattern detected","code":"ATTACK_BLOCKED"}';
    }
    
    # Check decoded request_uri for path traversal
    if ($request_uri ~* "(\.\./|\.\.[\\\\]|/etc/|/proc/|/sys/|/var/|/boot/|/root/|/usr/|/bin/|/sbin/|/dev/|/tmp/|\.git|\.env|passwd|shadow|hosts|\.ini|\.conf|\.config|htaccess|htpasswd)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"Path traversal attempt detected","code":"PATH_TRAVERSAL_BLOCKED","request_id":"$req_id"}';
    }
    
    # Check raw arguments for URL-encoded attacks
    if ($args ~* "(\.\.|%2e%2e|%252e%252e|\.%2e|%2e\.|%2fetc%2f|%2fproc%2f|%2fvar%2f|%2fpasswd|%2fshadow|%2fhosts)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"URL-encoded attack detected","code":"ENCODED_ATTACK_BLOCKED","request_id":"$req_id"}';
    }
    
    # Check for malicious patterns in the entire request URI
    if ($request_uri ~* "^/api/user/[^/]*/.*(\.\.|%2e%2e|%252e%252e|/etc/|/proc/|/var/|passwd|shadow|hosts)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"Malicious path pattern detected","code":"MALICIOUS_PATH_BLOCKED","request_id":"$req_id"}';
    }
    
    # Specifically check for double-dot sequences in user paths
    if ($request_uri ~* "^/api/user/([^/]+/)?.*\.\..*") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"Invalid path sequence detected","code":"INVALID_PATH_SEQUENCE","request_id":"$req_id"}';
    }

    # SQL Injection Protection
    if ($request_uri ~* "(union.*select|insert.*into|delete.*from|drop.*table|exec.*sp_configure|--\s*$|;.*--|'.*OR.*'|'.*AND.*'|waitfor.*delay|sleep\s*[(])") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"SQL injection attempt detected","code":"SQLI_BLOCKED","request_id":"$req_id"}';
    }
    
    if ($args ~* "(union.*select|insert.*into|delete.*from|drop.*table|exec.*sp_configure|--\s*$|;.*--|'.*OR.*'|'.*AND.*'|waitfor.*delay|sleep\s*[(])") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"SQL injection in parameters detected","code":"SQLI_PARAMS_BLOCKED","request_id":"$req_id"}';
    }
    
    # XSS Protection 
    if ($request_uri ~* "(<script|javascript:|onerror=|onload=|eval\s*[(]|alert\s*[(]|document\.|window\.|base64_decode|String\.fromCharCode|<iframe|<img\s+src)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"XSS attempt detected","code":"XSS_BLOCKED","request_id":"$req_id"}';
    }
    
    if ($args ~* "(<script|javascript:|onerror=|onload=|eval\s*[(]|alert\s*[(]|document\.|window\.|base64_decode|String\.fromCharCode|<iframe|<img\s+src)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"XSS in parameters detected","code":"XSS_PARAMS_BLOCKED","request_id":"$req_id"}';
    }
    
    # Block suspicious patterns
    if ($request_uri ~* "(%00|0x00|[$][{]|[(]\s*[)]|[|][|]|&&|;|`|<|>)") {
        access_log /var/log/nginx/security_blocked.log security_log;
        return 403 '{"error":"Malicious characters detected","code":"CHARACTER_BLOCKED","request_id":"$req_id"}';
    }
    
    # Enhanced rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_req zone=per_user burst=10 nodelay;
    limit_req_status 429;
    
    # === Size Limits ===
    client_max_body_size 10k;
    client_body_buffer_size 10k;
    
    # === Security Headers ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
   
    proxy_pass http://api_service;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $req_id;
    proxy_redirect off;
    
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Original-URI $request_uri;
    
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    access_log /var/log/nginx/api.log security_log;
    error_page 403 = @user_blocked;
}

error_page 404 = @not_found;
location @not_found {
    add_header Content-Type application/json always;
    return 404 '{"status":"error","statusCode":404,"error":"Not Found","message":"The requested resource does not exist"}';
}

error_page 429 = @rate_limited;
location @rate_limited {
    add_header Content-Type application/json always;
    return 429 '{"status":"error","statusCode":429,"error":"Too Many Requests","message":"Too many requests. Please slow down and try again later."}';
}