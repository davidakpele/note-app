# Error Pages Configuration

error_page 400 /400.html;
error_page 401 /401.html;
error_page 403 /403.html;
error_page 404 /404.html;
error_page 405 /405.html;
error_page 429 /429.html;
error_page 500 502 503 504 /50x.html;

location = /400.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 400 '{"error": "Bad Request", "code": 400}';
}

location = /401.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 401 '{"error": "Unauthorized", "code": 401}';
}

location = /403.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 403 '{"error": "Forbidden", "code": 403}';
}

location = /404.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 404 '{"error": "Not Found", "code": 404}';
}

location = /405.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 405 '{"error": "Method Not Allowed", "code": 405}';
}

location = /429.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded", "code": 429}';
}

location = /50x.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 500 '{"error": "Internal Server Error", "code": 500}';
}

location = /maintenance.html {
    root /usr/share/nginx/html;
    internal;
    default_type application/json;
    return 503 '{"error": "Service Unavailable", "message": "System under maintenance", "code": 503}';
}