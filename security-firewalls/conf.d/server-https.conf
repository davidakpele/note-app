# Main HTTPS Server Block

server {
    listen 8000;
    server_name localhost;
    
    # Global connection limiting
    limit_conn conn_limit 50;
     
    # Add custom headers
    add_header X-Request-ID $req_id always;
    add_header X-API-Version $api_version always;

    # Include location configurations
    include /etc/nginx/conf.d/location-services.conf;
    include /etc/nginx/conf.d/error-pages.conf;
    include /etc/nginx/conf.d/security-blocks.conf;
}