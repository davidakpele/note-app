# Block sensitive files and directories
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

location ~ /(\.env|\.git|\.svn|\.htaccess|\.htpasswd|composer\.json|package\.json|yarn\.lock|\.dockerignore|Dockerfile) {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# Block backup and temporary files
location ~ \.(bak|backup|old|orig|save|swp|tmp|temp)$ {
    deny all;
    return 404;
}

# WAF-like SQL injection blocking in URL
location ~* "(union\s+select|insert\s+into|delete\s+from|drop\s+table|update\s+.*set|exec\s*\(|execute\s*\()" {
    deny all;
    access_log /var/log/nginx/security_blocked.log;
    return 403 '{"error": "SQL injection attempt detected"}';
}

# Block XSS attempts in URL
location ~* "(<script|javascript:|onerror=|onload=|eval\(|base64_decode|phpinfo|shell_exec)" {
    deny all;
    access_log /var/log/nginx/security_blocked.log;
    return 403 '{"error": "XSS attempt detected"}';
}

# Block path traversal attempts
location ~* "\.\./|\.\.\\|etc/passwd|etc/shadow|windows/system" {
    deny all;
    access_log /var/log/nginx/security_blocked.log;
    return 403 '{"error": "Path traversal attempt detected"}';
}

# Block command injection attempts
location ~* "(wget\s+|curl\s+|/bin/bash|/bin/sh|cmd\.exe|powershell)" {
    deny all;
    access_log /var/log/nginx/security_blocked.log;
    return 403 '{"error": "Command injection attempt detected"}';
}