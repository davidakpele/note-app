# Enhanced Security Headers Configuration

###############################################
# CORE SECURITY HEADERS
###############################################

# Defend against clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Block simple XSS vectors
add_header X-XSS-Protection "1; mode=block" always;

# Hide referrer information
add_header Referrer-Policy "no-referrer" always;

# Enforce HTTPS for 2 years
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;


# Strict Content-Security-Policy
add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
add_header Content-Security-Policy-Report-Only "default-src 'none'; script-src 'self'; style-src 'self' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri /api/csp-report" always;

# Restrict feature permissions
add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(), gamepad=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), picture-in-picture=(), sync-xhr=(), vr=(), xr-spatial-tracking=()" always;

# Cross-Origin policies
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

###############################################
# STRICT CONTENT SECURITY POLICY (CSP)
###############################################
add_header Content-Security-Policy "
    default-src 'none';
    script-src 'self';
    style-src 'self' https:;
    img-src 'self' data: https:;
    font-src 'self' https: data:;
    connect-src 'self' https: wss:;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    object-src 'none';
" always;


# Report-only CSP for monitoring violations
add_header Content-Security-Policy-Report-Only "
    default-src 'none';
    script-src 'self';
    style-src 'self' https:;
    img-src 'self' data: https:;
    font-src 'self' https: data:;
    connect-src 'self' https: wss:;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    object-src 'none';
    report-uri /api/csp-report;
" always;

###############################################
# PERMISSIONS POLICY
###############################################
add_header Permissions-Policy "
    accelerometer=(),
    ambient-light-sensor=(),
    autoplay=(),
    battery=(),
    camera=(),
    display-capture=(),
    document-domain=(),
    encrypted-media=(),
    fullscreen=(),
    gamepad=(),
    geolocation=(),
    gyroscope=(),
    magnetometer=(),
    microphone=(),
    midi=(),
    payment=(),
    usb=(),
    picture-in-picture=(),
    sync-xhr=(),
    vr=(),
    xr-spatial-tracking=()
" always;


# Disable client-side caching for sensitive data
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;

# Additional security metadata
add_header X-Banking-API-Version "2.0" always;
add_header X-Content-Type-Options "nosniff" always;

###############################################
# REMOVE SENSITIVE HEADERS
###############################################
proxy_hide_header X-Runtime;
proxy_hide_header X-Powered-By;

###############################################
# CUSTOM API METADATA
###############################################
add_header X-Banking-API-Version "2.0" always;

# CORS settings
add_header Access-Control-Allow-Origin "https://trustedpartner.com" always;
add_header Access-Control-Allow-Methods "POST, PUT, GET, POST, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
add_header Access-Control-Allow-Credentials "true" always;
# Preflight cache duration
add_header Access-Control-Max-Age "86400" always;


